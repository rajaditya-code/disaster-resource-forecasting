# Streamlit Cloud configuration
[general]
# Ensure correct Python version
# python = "3.11"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[theme]
primaryColor = "#4361ee"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1a2e"
textColor = "#e0e0e0"
font = "sans serif"

[browser]
gatherUsageStats = false
